<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 25px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.4);
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .weather-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: #f7fbff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .city {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }

        .temp {
            font-size: 36px;
            font-weight: 600;
            color: #4facfe;
            margin: 10px 0;
        }

        .details {
            font-size: 15px;
            color: #555;
            margin-top: 8px;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #4facfe;
            font-weight: 500;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>🌤 Weather Dashboard</h2>

        <div class="search-box">
            <input
                    type="text"
                    id="city"
                    placeholder="Enter city name"
            >

            <button onclick="getWeather()">
                Search
            </button>
        </div>

        <div class="loading" id="loading">
            Loading weather data...
        </div>

        <div class="error" id="error">
            City not found. Please try again.
        </div>

        <div class="weather-box" id="result" style="display:none;">

            <div class="city" id="cityName"></div>

            <div class="temp" id="temperature"></div>

            <div class="details" id="condition"></div>

            <div class="details" id="humidity"></div>

        </div>

    </div>

</div>

<script>

    function getWeather() {

        let city = document.getElementById("city").value;

        if(city === "") {
            alert("Please enter a city name");
            return;
        }

        document.getElementById("loading").style.display = "block";
        document.getElementById("error").style.display = "none";
        document.getElementById("result").style.display = "none";

        fetch("/weather/" + city)

            .then(response => {

                if(!response.ok) {
                    throw new Error("City not found");
                }

                return response.json();
            })

            .then(data => {

                document.getElementById("cityName").innerHTML = data.city;

                document.getElementById("temperature").innerHTML =
                    data.temperature + " °C";

                document.getElementById("condition").innerHTML =
                    "Condition: " + data.weatherCondition;

                document.getElementById("humidity").innerHTML =
                    "Humidity: " + data.humidity + " %";

                document.getElementById("loading").style.display = "none";

                document.getElementById("result").style.display = "block";

            })

            .catch(error => {

                document.getElementById("loading").style.display = "none";

                document.getElementById("error").style.display = "block";

            });

    }

</script>

</body>
</html>
